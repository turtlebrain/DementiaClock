<!DOCTYPE html>
<html>
<head>
  <title>Reminder Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 300px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Reminder Dashboard</h1>

  <h2>Add Reminder</h2>
  <form action="/add-reminder" method="POST">
    <input type="text" name="title" placeholder="Reminder title" required><br>
    <input type="time" name="time" required><br>
    <input type="datetime-local" name="timestamp" required><br>
    <button type="submit">Add Reminder</button>
  </form>

</body>
</html>
